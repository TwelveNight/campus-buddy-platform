services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: campus_buddy
      MYSQL_USER: night
      MYSQL_PASSWORD: 123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  backend:
    image: twelvenightl/campus-buddy-backend:latest
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/campus_buddy?useUnicode=true&characterEncoding=utf8
      MYSQL_USERNAME: night
      MYSQL_PASSWORD: 123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QINIU_ACCESS_KEY: ${QINIU_ACCESS_KEY}
      QINIU_SECRET_KEY: ${QINIU_SECRET_KEY}
      QINIU_BUCKET: ${QINIU_BUCKET}
      QINIU_DOMAIN: ${QINIU_DOMAIN}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: twelvenightl/campus-buddy-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
