spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/campus_buddy?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:password}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  # 启用静态资源映射，允许访问测试页面
  web:
    resources:
      add-mappings: true
      static-locations: classpath:/static/
      chain:
        enabled: true
      cache:
        period: 0
  mvc:
    problemdetails:
      enabled: false
  websocket:
    config:
      allowedOrigins: '*'  # 允许的 WebSocket 来源，生产环境中应当限制
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 3000ms
  # 邮件发送配置（使用环境变量，以 QQ 邮箱 SMTP 为示例）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your_email@qq.com}
    password: ${MAIL_PASSWORD:your_smtp_auth_code}
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  type-aliases-package: com.example.campusbuddy.entity
  mapper-locations: classpath:mapper/*.xml
  # 开启驼峰命名
  configuration-properties:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

qiniu:
  access-key: ${QINIU_ACCESS_KEY:your_access_key_here}
  secret-key: ${QINIU_SECRET_KEY:your_secret_key_here}
  bucket: ${QINIU_BUCKET:campus-buddy-platform}
  domain: ${QINIU_DOMAIN:http://example.domain.com}

email:
  from: ${MAIL_USERNAME:your_email@qq.com}
  code-expire-seconds: 300  # 验证码有效期（秒）
